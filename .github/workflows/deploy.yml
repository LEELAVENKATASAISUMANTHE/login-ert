name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
      full_image: ${{ steps.vars.outputs.full_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: vars
        run: |
          TAG=${GITHUB_SHA::7}
          IMAGE_NAME=ghcr.io/LEELAVENKATASAISUMANTHE/login-ert-backend
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "full_image=${IMAGE_NAME}:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.vars.outputs.full_image }}
            ghcr.io/LEELAVENKATASAISUMANTHE/login-ert-backend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Apply namespace
        run: kubectl apply -f k8s/namespace.yaml

      - name: Create/update ghcr-secret
        run: |
          kubectl create secret docker-registry ghcr-secret \
            --namespace=erp \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create/update backend-secret
        run: |
          kubectl create secret generic backend-secret \
            --namespace=erp \
            --from-literal=NODE_ENV=production \
            --from-literal=PORT=3225 \
            --from-literal=DB_HOST=${{ secrets.DB_HOST }} \
            --from-literal=DB_PORT=5432 \
            --from-literal=DB_NAME=${{ secrets.DB_NAME }} \
            --from-literal=DB_USER=${{ secrets.DB_USER }} \
            --from-literal=DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            --from-literal=JWT_SECRET=${{ secrets.JWT_SECRET }} \
            --from-literal=REDIS_URL=${{ secrets.REDIS_URL }} \
            --from-literal=KAFKA_BROKERS=${{ secrets.KAFKA_BROKERS }} \
            --from-literal=LOKI_HOST=${{ secrets.LOKI_HOST }} \
            --from-literal=APP_NAME=placement-erp \
            --from-literal=R2_ACCOUNT_ID=${{ secrets.R2_ACCOUNT_ID }} \
            --from-literal=R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }} \
            --from-literal=R2_SECRET_ACCESS_KEY=${{ secrets.R2_SECRET_ACCESS_KEY }} \
            --from-literal=R2_BUCKET_STUDENTS=${{ secrets.R2_BUCKET_STUDENTS }} \
            --from-literal=R2_BUCKET_DOCUMENTS=${{ secrets.R2_BUCKET_DOCUMENTS }} \
            --from-literal=R2_BUCKET_CERTIFICATIONS=${{ secrets.R2_BUCKET_CERTIFICATIONS }} \
            --from-literal=R2_BUCKET_COMPANIES=${{ secrets.R2_BUCKET_COMPANIES }} \
            --from-literal=COOKIE_DOMAIN=${{ secrets.COOKIE_DOMAIN }} \
            --from-literal=COOKIE_SAMESITE=none \
            --from-literal=COOKIE_SECURE=true \
            --from-literal=CORS_ORIGINS=${{ secrets.CORS_ORIGINS }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Inject image tag into deployment manifest
        run: |
          sed -i "s|IMAGE_TAG_PLACEHOLDER|${{ needs.build.outputs.full_image }}|g" k8s/deployment.yaml

      - name: Apply manifests
        run: |
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/ingress.yaml
          kubectl apply -f k8s/hpa.yaml

      - name: Wait for rollout
        run: kubectl rollout status deployment/backend --namespace=erp --timeout=120s

      - name: Wait for pods ready
        run: kubectl wait pods -n erp -l app=backend --for=condition=Ready --timeout=90s

      - name: Print pod status
        run: kubectl get pods -n erp -l app=backend

  rollback:
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()
    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Rollback deployment
        run: kubectl rollout undo deployment/backend --namespace=erp

      - name: Wait for rollback rollout
        run: kubectl rollout status deployment/backend --namespace=erp --timeout=90s

      - name: Print pod status
        run: kubectl get pods -n erp -l app=backend