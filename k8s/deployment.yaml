apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: erp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: backend
          image: IMAGE_TAG_PLACEHOLDER
          ports:
            - containerPort: 3225
          envFrom:
            - secretRef:
                name: backend-secret
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 600m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3225
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3225
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3
